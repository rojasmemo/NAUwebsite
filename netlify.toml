# /netlify.toml

# Configuración para Netlify

# Opciones de build
[build]
  # Comando para construir el sitio
  command = "npm run build"
  # Directorio de publicación
  publish = "dist"

# Redirecciones
# Netlify redirige automáticamente de HTTP a HTTPS.
# Para la redirección de www a no-www (o viceversa),
# configura tu dominio principal en el panel de Netlify.

# Cabeceras HTTP
[[headers]]
  # Aplica estas cabeceras a todas las páginas
  for = "/*"
  [headers.values]
    # Cabeceras de seguridad
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Política de Seguridad de Contenido (CSP)
    # NOTA: Se ha mantenido 'unsafe-inline' para scripts y estilos
    # debido a scripts en línea en tu HTML. Para mayor seguridad,
    # considera mover estos scripts a archivos .js externos.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com; frame-src 'self' https://www.google.com;"

# Reglas de caché para diferentes tipos de archivos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
